<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markpad — MD Editor</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --panel:     #181c22;
      --border:    #252a33;
      --accent:    #e8ff48;
      --accent2:   #48ffd4;
      --text:      #d4dae6;
      --muted:     #5a6377;
      --danger:    #ff4d6a;
      --radius:    6px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
      --serif:     'Lora', serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR */
    #topbar {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
      margin-right: 4px;
      white-space: nowrap;
    }

    .logo span { color: var(--text); font-weight: 400; }

    .sep { width: 1px; height: 22px; background: var(--border); }

    #filename-input {
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 4px 8px;
      min-width: 140px;
      max-width: 240px;
      transition: border-color .15s;
      outline: none;
    }
    #filename-input:hover { border-color: var(--border); }
    #filename-input:focus { border-color: var(--accent); background: var(--panel); }

    .save-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--danger);
      opacity: 0;
      transition: opacity .2s;
      flex-shrink: 0;
    }
    .save-dot.visible { opacity: 1; }

    .spacer { flex: 1; }

    #stats {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 14px;
    }

    .view-btns {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .view-btn {
      padding: 5px 11px;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color .15s, background .15s;
      letter-spacing: .3px;
    }
    .view-btn:hover { color: var(--text); }
    .view-btn.active { background: var(--accent); color: #0d0f12; }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .4px;
      cursor: pointer;
      border: none;
      transition: all .15s;
    }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary {
      background: var(--accent);
      color: #0d0f12;
    }
    .btn-primary:hover { background: #f2ff6e; transform: translateY(-1px); }

    /* MAIN LAYOUT */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* EDITOR PANE */
    #editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
      transition: flex .2s ease;
    }

    #editor-pane.hidden { flex: 0; min-width: 0; overflow: hidden; border-right: none; }

    .pane-header {
      height: 34px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      gap: 8px;
      flex-shrink: 0;
    }

    .pane-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: var(--panel);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.8;
      padding: 28px 32px;
      tab-size: 2;
      overflow-y: auto;
      caret-color: var(--accent);
    }

    #editor::selection { background: rgba(232,255,72,.15); }
    #editor::-webkit-scrollbar { width: 6px; }
    #editor::-webkit-scrollbar-track { background: transparent; }
    #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* PREVIEW PANE */
    #preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #preview-pane.hidden { flex: 0; overflow: hidden; }

    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 36px 44px;
      background: var(--bg);
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.9;
      color: #c8d0e0;
    }

    #preview::-webkit-scrollbar { width: 6px; }
    #preview::-webkit-scrollbar-track { background: transparent; }
    #preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6 {
      font-family: var(--sans);
      color: #edf0f7;
      margin: 1.8em 0 .5em;
      line-height: 1.25;
      font-weight: 700;
    }
    #preview h1 { font-size: 2em; font-weight: 800; letter-spacing: -1px; border-bottom: 2px solid var(--accent); padding-bottom: .3em; }
    #preview h2 { font-size: 1.45em; border-bottom: 1px solid var(--border); padding-bottom: .25em; }
    #preview h3 { font-size: 1.2em; color: var(--accent2); }
    #preview p { margin: .85em 0; }
    #preview a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(232,255,72,.35); transition: border-color .15s; }
    #preview a:hover { border-color: var(--accent); }
    #preview code {
      font-family: var(--mono);
      font-size: .85em;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent2);
    }
    #preview pre {
      background: var(--surface) !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 1.2em 0;
      position: relative;
    }
    #preview pre code {
      background: none !important;
      border: none !important;
      padding: 0 !important;
      color: inherit !important;
      font-size: 13px;
    }
    #preview blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.2em 0;
      padding: .5em 0 .5em 1.4em;
      color: var(--muted);
      font-style: italic;
    }
    #preview ul, #preview ol { padding-left: 1.6em; margin: .75em 0; }
    #preview li { margin: .3em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: 1.2em 0; font-family: var(--mono); font-size: 13px; }
    #preview th { background: var(--surface); border: 1px solid var(--border); padding: 10px 14px; text-align: left; font-family: var(--sans); font-weight: 700; font-size: 12px; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
    #preview td { border: 1px solid var(--border); padding: 9px 14px; }
    #preview tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    #preview img { max-width: 100%; border-radius: 8px; margin: 1em 0; }
    #preview hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    #preview strong { color: #edf0f7; font-weight: 600; }
    #preview em { color: #b0bcd0; }
    #preview input[type="checkbox"] { accent-color: var(--accent); margin-right: 6px; }

    /* DRAG OVERLAY */
    #drop-overlay {
      position: fixed; inset: 0;
      background: rgba(13,15,18,.92);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    #drop-overlay.active { display: flex; }
    .drop-icon { font-size: 56px; animation: bounce .8s infinite alternate; }
    @keyframes bounce { to { transform: translateY(-10px); } }
    .drop-text { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .drop-sub { font-size: 14px; color: var(--muted); font-family: var(--mono); }

    /* EMPTY STATE */
    #empty-state {
      position: absolute;
      inset: 0 0 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 5;
      transition: opacity .3s;
      background: var(--bg);
    }
    #empty-state.hidden { opacity: 0; pointer-events: none; }
    .empty-icon { font-size: 52px; }
    .empty-title { font-size: 22px; font-weight: 800; color: var(--muted); letter-spacing: -0.5px; }
    .empty-sub { font-size: 13px; color: var(--muted); font-family: var(--mono); opacity: .6; }
    .empty-actions { display: flex; gap: 10px; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: var(--mono);
      opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    #file-input { display: none; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">Mark<span>pad</span></div>
  <div class="sep"></div>
  <input id="filename-input" type="text" value="untitled.md" spellcheck="false" />
  <div class="save-dot" id="save-dot" title="Unsaved changes"></div>

  <div class="spacer"></div>

  <div id="stats">
    <span id="stat-words">0 words</span>
    <span id="stat-chars">0 chars</span>
    <span id="stat-lines">0 lines</span>
  </div>

  <div class="sep"></div>

  <div class="view-btns">
    <button class="view-btn active" data-view="split">Split</button>
    <button class="view-btn" data-view="edit">Edit</button>
    <button class="view-btn" data-view="preview">Preview</button>
  </div>

  <div class="sep"></div>

  <button class="btn btn-ghost" id="btn-open" title="Open MD file">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Open
  </button>
  <button class="btn btn-ghost" id="btn-new" title="New file">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    New
  </button>
  <button class="btn btn-primary" id="btn-save" title="Save / Download (Ctrl+S)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Save
  </button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- empty state — sits above everything until dismissed -->
  <div id="empty-state">
    <div class="empty-icon">📄</div>
    <div class="empty-title">No file open</div>
    <div class="empty-sub">Drop a .md file anywhere, or start fresh</div>
    <div class="empty-actions">
      <button class="btn btn-ghost" id="btn-open-empty">Open file</button>
      <button class="btn btn-primary" id="btn-new-empty">New file</button>
    </div>
  </div>

  <!-- editor -->
  <div id="editor-pane">
    <div class="pane-header">
      <div class="pane-dot" style="background:#e8ff48"></div>
      Editor
    </div>
    <textarea id="editor" placeholder="Start writing markdown…" spellcheck="false"></textarea>
  </div>

  <!-- preview -->
  <div id="preview-pane">
    <div class="pane-header">
      <div class="pane-dot" style="background:#48ffd4"></div>
      Preview
    </div>
    <div id="preview"></div>
  </div>
</div>

<!-- drag overlay -->
<div id="drop-overlay">
  <div class="drop-icon">📂</div>
  <div class="drop-text">Drop your Markdown file</div>
  <div class="drop-sub">.md · .markdown · .txt</div>
</div>

<!-- toast -->
<div id="toast"></div>

<!-- file input -->
<input id="file-input" type="file" accept=".md,.markdown,.txt" />

<script>
  // ── State ──
  let isDirty = false;
  let currentView = 'split';
  let hasFile = false;

  const editor       = document.getElementById('editor');
  const preview      = document.getElementById('preview');
  const editorPane   = document.getElementById('editor-pane');
  const previewPane  = document.getElementById('preview-pane');
  const saveDot      = document.getElementById('save-dot');
  const emptyState   = document.getElementById('empty-state');
  const fileInput    = document.getElementById('file-input');
  const filenameInput = document.getElementById('filename-input');

  // ── Marked setup ──
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch (_) {}
      }
      return hljs.highlightAuto(code).value;
    },
    breaks: true,
    gfm: true
  });

  // ── Dismiss empty state ──
  function dismissEmpty() {
    if (!hasFile) {
      hasFile = true;
      emptyState.classList.add('hidden');
    }
  }

  // ── Render ──
  function render() {
    const md = editor.value;
    preview.innerHTML = marked.parse(md);
    preview.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    updateStats(md);
  }

  function updateStats(md) {
    const lines = md.split('\n').length;
    const words = md.trim() ? md.trim().split(/\s+/).length : 0;
    const chars = md.length;
    document.getElementById('stat-words').textContent = `${words} word${words !== 1 ? 's' : ''}`;
    document.getElementById('stat-chars').textContent = `${chars} char${chars !== 1 ? 's' : ''}`;
    document.getElementById('stat-lines').textContent = `${lines} line${lines !== 1 ? 's' : ''}`;
  }

  // ── Editor listeners ──
  editor.addEventListener('focus', () => {
    dismissEmpty();
  });

  editor.addEventListener('input', () => {
    dismissEmpty();
    render();
    if (!isDirty) {
      isDirty = true;
      saveDot.classList.add('visible');
    }
  });

  // ── View switching ──
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      applyView();
    });
  });

  function applyView() {
    editorPane.classList.remove('hidden');
    previewPane.classList.remove('hidden');
    if (currentView === 'edit') previewPane.classList.add('hidden');
    if (currentView === 'preview') editorPane.classList.add('hidden');
  }

  // ── Load file ──
  function loadFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      editor.value = e.target.result;
      filenameInput.value = file.name;
      render();
      isDirty = false;
      saveDot.classList.remove('visible');
      dismissEmpty();
      toast(`Opened ${file.name}`);
    };
    reader.readAsText(file);
  }

  // ── Open button ──
  document.getElementById('btn-open').addEventListener('click', () => fileInput.click());
  document.getElementById('btn-open-empty').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    loadFile(e.target.files[0]);
    fileInput.value = '';
  });

  // ── New file ──
  function newFile() {
    if (isDirty && !confirm('You have unsaved changes. Create new file anyway?')) return;
    editor.value = '# New Document\n\nStart writing here…\n';
    filenameInput.value = 'untitled.md';
    render();
    isDirty = false;
    saveDot.classList.remove('visible');
    dismissEmpty();
    editor.focus();
    toast('New file created');
  }

  document.getElementById('btn-new').addEventListener('click', newFile);
  document.getElementById('btn-new-empty').addEventListener('click', newFile);

  // ── Save / Download ──
  document.getElementById('btn-save').addEventListener('click', saveFile);

  function saveFile() {
    // If still on empty state, nothing to save
    if (!hasFile && editor.value.trim() === '') {
      toast('Nothing to save — write something first!', true);
      return;
    }
    const content = editor.value;
    let filename = filenameInput.value.trim() || 'untitled.md';
    if (!filename.endsWith('.md') && !filename.endsWith('.markdown')) filename += '.md';

    const blob = new Blob([content], { type: 'text/markdown' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);

    isDirty = false;
    saveDot.classList.remove('visible');
    toast(`Saved as ${filename}`);
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveFile();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
      e.preventDefault();
      fileInput.click();
    }
    if (e.key === 'Tab' && document.activeElement === editor) {
      e.preventDefault();
      const start = editor.selectionStart;
      const end   = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + '  ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      render();
    }
  });

  // ── Drag & Drop ──
  const dropOverlay = document.getElementById('drop-overlay');

  document.addEventListener('dragover', e => {
    e.preventDefault();
    dropOverlay.classList.add('active');
  });

  document.addEventListener('dragleave', e => {
    if (e.relatedTarget === null) dropOverlay.classList.remove('active');
  });

  document.addEventListener('drop', e => {
    e.preventDefault();
    dropOverlay.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file && /\.(md|markdown|txt)$/i.test(file.name)) {
      loadFile(file);
    } else if (file) {
      toast('Please drop a .md or .markdown file', true);
    }
  });

  // ── Toast ──
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function toast(msg, error = false) {
    toastEl.textContent = msg;
    toastEl.style.borderLeftColor = error ? 'var(--danger)' : 'var(--accent)';
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
  }

  // ── Init ──
  updateStats('');
  render();
</script>
</body>
</html>
